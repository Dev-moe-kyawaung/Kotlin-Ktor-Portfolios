<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body">
<body>
<section>
  <h1>Projects</h1>
  <div class="grid">
    <article th:each="project : ${projects}">
      <img th:src="${project.imageUrl}" th:alt="${project.title}">
      <h3 th:text="${project.title}"></h3>
      <p th:text="${project.description}"></p>
    </article>
  </div>
</section>
</body>
</html>
